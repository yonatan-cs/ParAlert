# Render Blueprint for the SafeNet backend (FS-A).
# Deploy: Render dashboard -> New + -> Blueprint -> pick this repo -> Apply.
# Gives a public https URL + wss for /ws/alerts. Hand the URL to FS-B (VITE_API_BASE).
#
# The WhatsApp bridge is NOT deployed here — run it from a laptop pointing at this
# backend (BACKEND_URL=https://<this-service>/ingest), which avoids shipping Chromium
# to the cloud. See whatsapp_bridge/README.md.
services:
  - type: web
    name: safenet-backend
    runtime: python
    plan: free                       # free tier sleeps after ~15 min idle (cold start ~50s)
    rootDir: backend_api             # build + start run from backend_api/
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: USE_MODEL
        value: "false"               # flip to "true" once the ML pair merges the real model
      - key: ALERT_THRESHOLD
        value: "0.5"
      - key: SEED_ON_STARTUP
        value: "true"            # free tier wipes the DB on restart -> auto-reload demo data
      # CORS defaults to "*" (fine for the demo). To lock down, add:
      #   - key: CORS_ORIGINS
      #     value: "https://<your-vercel-app>.vercel.app"
