<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ParAlert</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply language/direction + theme before paint to avoid an RTL/LTR or
      // light/dark flash. Priority: ?lang= query (shareable English link) > saved.
      try {
        var q = new URLSearchParams(location.search).get("lang");
        var l = q === "en" || q === "he" ? q : localStorage.getItem("safenet.lang");
        if (l === "en" || l === "he") {
          document.documentElement.lang = l;
          document.documentElement.dir = l === "he" ? "rtl" : "ltr";
        }
        var qt = new URLSearchParams(location.search).get("theme");
        var th = qt === "light" || qt === "dark" ? qt : localStorage.getItem("paralert.theme");
        if (th !== "light" && th !== "dark") th = "dark"; // dark stays the default identity
        document.documentElement.dataset.theme = th;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
